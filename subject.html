<script>
function validateSubject() {
    var subjectId = document.querySelector('input[name="subject_id"]').value.trim();
    var subjectName = document.querySelector('input[name="subject_name"]').value.trim();
    var courseId = document.querySelector('input[name="course_id"]').value.trim();
    var credits = document.querySelector('input[name="credits"]').value.trim();
    var semester = document.querySelector('select[name="semester"]').value;

    if (
        subjectId === "" ||
        subjectName === "" ||
        courseId === "" ||
        credits === "" ||
        semester === ""
    ) {
        alert("Please fill all the fields");
        return false; // stop form submission
    }

    return true; // allow submission
}
</script>

        <input type="text" name="course_id" placeholder="Course ID">
        <input type="text" name="credits" placeholder="Credits">
