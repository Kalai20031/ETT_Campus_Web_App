<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lecturer Registration</title>
<link rel="stylesheet" href="css/style.css">

<script>
function validateLecturer() {
    var lecturerId = document.querySelector('input[name="lecturer_id"]').value.trim();
    var lecturerName = document.querySelector('input[name="lecturer_name"]').value.trim();
    var nic = document.querySelector('input[name="nic"]').value.trim();
    var email = document.querySelector('input[name="email"]').value.trim();
    var phone = document.querySelector('input[name="phone"]').value.trim();
    var department = document.querySelector('select[name="department"]').value;

    if (
        lecturerId === "" ||
        lecturerName === "" ||
        nic === "" ||
        email === "" ||
        phone === "" ||
        department === ""
    ) {
        alert("Please fill all the fields");
        return false; // stop form submission
    }

    return true; // allow submission
}
</script>
</head>
<body>

<header>
    <h1>Lecturer Registration</h1>
</header>

<nav>

    <a href="marks.html">Marks</a>
    <a href="logout.php" style="margin-left:auto;background:#e74c3c;">Logout</a>
</nav>

<div class="container">
    <h2>Register Lecturer</h2>
    <form method="POST" action="lecturer_crud.php" onsubmit="return validateLecturer();">
       
        <input type="text" name="lecturer_name" placeholder="Lecturer Name">
        <input type="text" name="nic" placeholder="NIC">
        <input type="email" name="email" placeholder="Email">
        <input type="text" name="phone" placeholder="Phone">
        <select name="department">
            <option value="">Select Department</option>
            <option>IT</option>
            <option>Maths</option>
            <option>Science</option>
            <option>Languages</option>
        </select>
        <button type="submit" name="add_lecturer">Register Lecturer</button>
    </form>
</div>

<div class="container">
     <form action="view_lecturers.php" method="post">
