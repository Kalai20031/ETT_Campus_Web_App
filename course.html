<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
function validateCourse() {
    var courseId = document.querySelector('input[name="course_id"]').value.trim();
    var courseName = document.querySelector('input[name="course_name"]').value.trim();
    var duration = document.querySelector('input[name="duration"]').value.trim();
    var credits = document.querySelector('input[name="credits"]').value.trim();
    var description = document.querySelector('textarea[name="description"]').value.trim();

    if (
        courseId === "" ||
        courseName === "" ||
        duration === "" ||
        credits === "" ||
        description === ""
    ) {
        alert("Please fill all the fields");
        return false; // stop form submission
    }

    return true; // allow submission
}
</script>
<title>Course Registration</title>
<link rel="stylesheet" href="css/style.css">
</head>

<div class="container">
    <h2>Add Course</h2>
    <form method="POST" action="course_crud.php" onsubmit="return validateCourse();">
      
        <input type="text" name="course_name" placeholder="Course Name">
        <input type="text" name="duration" placeholder="Duration (Years)">
        <input type="text" name="credits" placeholder="Credits">
        <textarea name="description" placeholder="Course Description"></textarea>
        <button type="submit" name="add_course">Add Course</button>
    </form>
</div>
